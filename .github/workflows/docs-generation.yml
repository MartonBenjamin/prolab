name: docs-generation

on:
  workflow_dispatch:
  schedule:
    - cron: "20 5 * * 1"

jobs:
  docs-generation:
    uses: MartonBenjamin/DeveloperWorkflow/.github/workflows/reusable-docs-generation.yml@main
    with:
      docs-command: auto
      target-doc-file: docs/PROJECT_OVERVIEW.md
      warning-mode: true
      create-pr: true
      pr-branch: docs/automation/update-overview
      pr-title: "docs: automated project overview refresh"
      pr-body: "Automated documentation refresh from DeveloperWorkflow reusable docs pipeline."
